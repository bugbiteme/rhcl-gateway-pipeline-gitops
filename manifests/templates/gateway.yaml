apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespace }}
  labels:
    app: {{ .Values.gateway.namespace }}
    kuadrant.io/gateway: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  gatewayClassName: {{ .Values.gateway.className }}
  listeners:
  - name: api
    hostname: {{ .Values.gateway.hostname | quote }}
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
      - group: ""
        kind: Secret
        name: api-{{ .Values.gateway.name }}-tls
    allowedRoutes:
      namespaces:
        from: All
  - name: http
    hostname: {{ .Values.gateway.hostname | quote }}
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
