apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.istio.name }}-gateway-controller
  annotations:
    argocd.argoproj.io/sync-wave: "0"
rules:
- apiGroups: ["gateway.networking.k8s.io"]
  resources:
  - gateways
  - gateways/status
  - gatewayclasses
  - gatewayclasses/status
  - httproutes
  - httproutes/status
  - grpcroutes
  - grpcroutes/status
  - referencegrants
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: [""]
  resources:
  - services
  - serviceaccounts
  - secrets
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources:
  - deployments
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.istio.name }}-gateway-controller
  annotations:
    argocd.argoproj.io/sync-wave: "0"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.istio.name }}-gateway-controller
subjects:
- kind: ServiceAccount
  name: istiod-{{ .Values.istio.name }}
  namespace: {{ .Values.gateway.namespace }}
