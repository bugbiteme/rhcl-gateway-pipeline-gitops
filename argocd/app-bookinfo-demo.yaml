apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bookinfo-demo
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/bugbiteme/rhcl-gateway-pipeline-gitops.git
    targetRevision: HEAD
    path: test-app
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: bookinfo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
