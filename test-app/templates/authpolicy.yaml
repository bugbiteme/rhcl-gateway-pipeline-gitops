apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: bookinfo-auth
  namespace: {{ .Values.app.namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: bookinfo
  defaults:
    when:
      - predicate: "request.path != '/health'"
    rules:
      authentication:
        "api-key-users":
          apiKey:
            selector:
              matchLabels:
                app: bookinfo
          credentials:
            authorizationHeader:
              prefix: APIKEY
      response:
        success:
          filters:
            "identity":
              json:
                properties:
                  "userid":
                    selector: auth.identity.metadata.annotations.secret\.kuadrant\.io/user-id
